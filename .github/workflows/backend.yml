name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revenuepilot
          POSTGRES_PASSWORD: revenuepilot
          POSTGRES_DB: revenuepilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U revenuepilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://revenuepilot:revenuepilot@localhost:5432/revenuepilot
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
